{% extends "base.html" %}
{% block content %}
<main class="main-container">
  <article>
    {{ body | safe }}
    {% if tags %}
    <div class="tags">
      {% for tag in tags %}
      <a href="{{ css_path | replace("style.css","") }}tags/{{ tag }}.html" class="tag-link">{{ tag }}</a>
      {% endfor %}
    </div>
    {% endif %}
  </article>
</main>
{% endblock %}
