{% extends "base.html" %}

{% block content %}
<h1>Index</h1>
<ul>
    {% for page in pages %}
    <li>
        <a href="{{ page.html_path }}">{{ page.title }}</a>
        {% if page.description %}
        <p>{{ page.description }}</p>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock %}
